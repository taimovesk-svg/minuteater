<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minuteater</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
      margin: 0;
      background: #f5f5f5;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 8px;
    }

    .subtitle {
      color: #555;
      margin-bottom: 24px;
    }

    .status {
      background: white;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.08);
    }

    .title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .meta {
      line-height: 1.6;
      color: #333;
    }

    .button {
      display: inline-block;
      margin-top: 12px;
      text-decoration: none;
      background: black;
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
    }

    .badge {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #ececec;
      font-size: 13px;
    }

    .error {
      color: #b00020;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🎭 Minuteater</h1>
    <div class="subtitle">
      Eesti Draamateatri saadavad etendused tänasest kuni 30 päeva ette.
    </div>

    <div id="status" class="status">Laen andmeid...</div>
    <div id="events"></div>
  </div>

  <script>
    async function loadEvents() {
      const statusEl = document.getElementById("status");
      const container = document.getElementById("events");

      try {
        const res = await fetch("/api/events");
        const data = await res.json();

        if (!Array.isArray(data)) {
          statusEl.innerHTML = "<span class='error'>Andmete laadimine ebaõnnestus.</span>";
          return;
        }

        statusEl.textContent = `Leitud ${data.length} sobivat etendust. Kõige lähem kuupäev on üleval.`;

        if (data.length === 0) {
          container.innerHTML = "<div class='card'>Ühtegi sobivat etendust ei leitud.</div>";
          return;
        }

        container.innerHTML = data.map(renderCard).join("");
      } catch (e) {
        statusEl.innerHTML = "<span class='error'>Tekkis viga andmete laadimisel.</span>";
      }
    }

    function renderCard(e) {
      const dt = new Date(e.datetime);
      const dateText = dt.toLocaleString("et-EE", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });

      const badge =
        typeof e.availableTickets === "number"
          ? `Vabu kohti: ${e.availableTickets}`
          : "Saadav";

      return `
        <div class="card">
          <div class="title">${escapeHtml(e.title)}</div>
          <div class="meta">
            <div><strong>Teater:</strong> ${escapeHtml(e.theatre)}</div>
            <div><strong>Aeg:</strong> ${escapeHtml(dateText)}</div>
            <div><strong>Koht:</strong> ${escapeHtml(e.venue || "-")}</div>
          </div>
          <div class="badge">${escapeHtml(badge)}</div><br/>
          <a class="button" href="${escapeHtml(e.url)}" target="_blank" rel="noopener noreferrer">Vaata Piletimaailmas</a>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadEvents();
  </script>
</body>
</html>
