<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minuteater</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 24px;
      margin: 0;
      background: #f5f5f5;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 8px;
    }

    .subtitle {
      color: #555;
      margin-bottom: 20px;
    }

    .status {
      background: white;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.08);
    }

    .card {
      background: #e6f7ec;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.08);
      border: 2px solid #2ecc71;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .meta {
      line-height: 1.7;
      color: #333;
      margin-bottom: 8px;
    }

    .button {
      display: inline-block;
      margin-top: 12px;
      text-decoration: none;
      background: black;
      color: white;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 600;
    }

    .button.secondary {
      background: #666;
    }

    .badge {
      display: inline-block;
      margin-top: 10px;
      padding: 7px 12px;
      border-radius: 999px;
      background: #2ecc71;
      color: white;
      font-size: 13px;
      font-weight: 700;
    }

    .error {
      color: #b00020;
    }

    .empty {
      background: white;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.08);
    }

    .small {
      margin-top: 10px;
      color: #666;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>🎭 Minuteater</h1>

    <div class="subtitle">
      Jälgitavad etendused: <strong>Ükskord Liibanonis</strong> ja <strong>Kuningas Ubu</strong>
    </div>

    <div id="status" class="status">Laen andmeid...</div>
    <div id="events"></div>
  </div>

  <script>
    async function loadEvents() {
      const statusEl = document.getElementById("status");
      const container = document.getElementById("events");

      try {
        const res = await fetch("/events.json");
        const data = await res.json();

        if (!Array.isArray(data)) {
          throw new Error("Invalid JSON");
        }

        const watchedTitles = ["ükskord liibanonis", "kuningas ubu"];

        const filtered = data.filter(e =>
          watchedTitles.includes((e.title || "").toLowerCase()) &&
          e.available === true
        );

        renderEvents(filtered);

      } catch (e) {
        statusEl.innerHTML = "<span class='error'>Tekkis viga andmete laadimisel.</span>";
        container.innerHTML = "";
      }
    }

    function renderEvents(data) {
      const statusEl = document.getElementById("status");
      const container = document.getElementById("events");

      statusEl.textContent =
        `Leitud ${data.length} saadaval etendust. Leht uueneb automaatselt iga 5 minuti järel.`;

      if (data.length === 0) {
        container.innerHTML = `
          <div class="empty">
            Praegu ei ole pileteid saadaval.
            <div class="small">Kontroll toimub automaatselt iga 5 minuti järel.</div>
          </div>
        `;
        return;
      }

      container.innerHTML = data.map(renderCard).join("");
    }

    function renderCard(e) {
      const mainUrl = e.url;
      const fallbackUrl = "https://www.piletimaailm.com/organizers/7-eesti-draamateater";

      return `
        <div class="card">
          <div class="title">${escapeHtml(e.title)}</div>

          <div class="meta">
            <div><strong>Teater:</strong> ${escapeHtml(e.theatre || "")}</div>
            <div><strong>Staatus:</strong> 🟢 Piletid saadaval!</div>
          </div>

          <div class="badge">🔥 SAADAVAL</div>

          <br/>

          <a class="button" href="${escapeHtml(mainUrl)}" target="_blank" rel="noopener noreferrer">
            🎟 Osta kohe
          </a>

          <br/>

          <a class="button secondary" href="${fallbackUrl}" target="_blank" rel="noopener noreferrer">
            📋 Ava kõik etendused
          </a>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadEvents();
    setInterval(loadEvents, 300000);
  </script>
</body>
</html>
